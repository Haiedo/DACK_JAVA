# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=kids-fashion-store
# FORCE BIND TO 0.0.0.0 FOR RENDER TO DETECT THE PORT
server.address=0.0.0.0
server.port=${PORT:8080}

# ===================================
# DATABASE CONFIGURATION (TiDB Cloud)
# ===================================
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/kidsfashion_db?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=44QyjBr7RbdHMya.root
spring.datasource.password=haiedo123@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
# SET TO 'none' TO SPEED UP STARTUP TIME ON DEPLOY
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/images

# ===================================
# LOGGING
# ===================================
logging.level.root=INFO
logging.level.com.kidsfashion=INFO
logging.level.org.springframework.security=INFO

# ===================================
# STATIC RESOURCES
# ===================================
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# ===================================
# DEVTOOLS
# ===================================
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
