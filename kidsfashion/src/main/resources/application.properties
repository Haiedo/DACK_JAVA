# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=kids-fashion-store
server.port=8080

# ===================================
# DATABASE CONFIGURATION (MySQL Workbench)
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/kidsfashion_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=uploads/images

# ===================================
# LOGGING
# ===================================
logging.level.com.kidsfashion=DEBUG
logging.level.org.springframework.security=DEBUG

spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# T?t tính n?ng t? ??ng kh?i ??ng l?i server khi ??i code
spring.devtools.restart.enabled=false
# T?t tính n?ng t? ??ng reload tŕnh duy?t
spring.devtools.livereload.enabled=false
