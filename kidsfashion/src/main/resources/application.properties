# ===================================
# APPLICATION CONFIGURATION
# ===================================
spring.application.name=kids-fashion-store
server.port=${PORT:8080}

# ===================================
# DATABASE CONFIGURATION (TiDB Cloud)
# ===================================
# Correct JDBC Format for Spring Boot
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.aws.tidbcloud.com:4000/kidsfashion_db?sslMode=VERIFY_IDENTITY&enabledTLSProtocols=TLSv1.2,TLSv1.3&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=44QyjBr7RbdHMya.root
spring.datasource.password=haiedo123@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ===================================
# FILE UPLOAD
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# File storage settings
app.upload.dir=uploads/images

# ===================================
# LOGGING
# ===================================
logging.level.com.kidsfashion=DEBUG
logging.level.org.springframework.security=DEBUG

# Static resources mapping
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# DevTools settings
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false