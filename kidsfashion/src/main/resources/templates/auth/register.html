<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Ký - KidsFashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; --primary-dark:#e05587; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,#fff0f5,#ffe8f0,#fff5e0); min-height:100vh; display:flex; align-items:center; padding:30px 0; }
        .card { border:none; border-radius:24px; box-shadow:0 20px 60px rgba(255,107,157,.2); }
        .btn-primary { background:var(--primary); border-color:var(--primary); border-radius:50px; padding:12px; font-weight:700; }
        .btn-primary:hover { background:var(--primary-dark); border-color:var(--primary-dark); }
        .form-control { border-radius:50px; padding:12px 20px; border:2px solid #f0d0e0; }
        .form-control:focus { border-color:var(--primary); box-shadow:0 0 0 .25rem rgba(255,107,157,.25); }
        .brand { font-family:'Pacifico',cursive; color:var(--primary); font-size:2rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <div class="brand">🧸 KidsFashion</div>
            </div>
            <div class="card p-4 p-md-5">
                <h4 class="fw-800 text-center mb-4">Tạo Tài Khoản</h4>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-700">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{username}" placeholder="Tên đăng nhập"/>
                            <div class="text-danger small mt-1" th:if="${usernameError}" th:text="${usernameError}"></div>
                            <div class="text-danger small mt-1" th:errors="*{username}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-700">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nguyễn Văn A"/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-700">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="email@example.com"/>
                            <div class="text-danger small mt-1" th:if="${emailError}" th:text="${emailError}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-700">Số điện thoại</label>
                            <input type="tel" class="form-control" th:field="*{phone}" placeholder="0901234567"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-700">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" th:field="*{password}" id="password" placeholder="Tối thiểu 6 ký tự"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-700">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" placeholder="Nhập lại mật khẩu"/>
                            <div class="text-danger small mt-1" th:if="${passwordError}" th:text="${passwordError}"></div>
                        </div>
                        <div class="col-12 mt-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-user-plus me-2"></i>Đăng Ký
                            </button>
                        </div>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted">Đã có tài khoản? </span>
                    <a href="/login" style="color:var(--primary);font-weight:700;text-decoration:none;">Đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
