<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Nhập - KidsFashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; --primary-dark:#e05587; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,#fff0f5,#ffe8f0,#fff5e0); min-height:100vh; display:flex; align-items:center; }
        .card { border:none; border-radius:24px; box-shadow:0 20px 60px rgba(255,107,157,.2); }
        .btn-primary { background:var(--primary); border-color:var(--primary); border-radius:50px; padding:12px; font-weight:700; font-size:1rem; }
        .btn-primary:hover { background:var(--primary-dark); border-color:var(--primary-dark); }
        .form-control { border-radius:50px; padding:12px 20px; border:2px solid #f0d0e0; }
        .form-control:focus { border-color:var(--primary); box-shadow:0 0 0 .25rem rgba(255,107,157,.25); }
        .brand { font-family:'Pacifico',cursive; color:var(--primary); font-size:2.5rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="text-center mb-4">
                <div class="brand">🧸 KidsFashion</div>
                <p class="text-muted">Chào mừng trở lại!</p>
            </div>
            <div class="card p-4 p-md-5">
                <h4 class="fw-800 text-center mb-4">Đăng Nhập</h4>

                <div th:if="${error}" class="alert alert-danger rounded-3" th:text="${error}"></div>
                <div th:if="${message}" class="alert alert-success rounded-3" th:text="${message}"></div>
                <div th:if="${success}" class="alert alert-success rounded-3" th:text="${success}"></div>

                <form action="/login" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label class="form-label fw-700">Tên đăng nhập</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius:50px 0 0 50px;border:2px solid #f0d0e0;">
                                <i class="fas fa-user" style="color:var(--primary)"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" name="username"
                                   placeholder="Nhập tên đăng nhập" style="border-radius:0 50px 50px 0;" required/>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-700">Mật khẩu</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border-radius:50px 0 0 50px;border:2px solid #f0d0e0;">
                                <i class="fas fa-lock" style="color:var(--primary)"></i>
                            </span>
                            <input type="password" class="form-control border-start-0" name="password"
                                   placeholder="Nhập mật khẩu" style="border-radius:0 50px 50px 0;" required/>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Đăng Nhập
                    </button>
                </form>
                <div class="divider d-flex align-items-center my-4">
                    <hr class="flex-grow-1" style="border-top: 2px solid #f0d0e0;">
                    <span class="mx-3 text-muted fw-bold small">HOẶC</span>
                    <hr class="flex-grow-1" style="border-top: 2px solid #f0d0e0;">
                </div>

                <div class="d-grid gap-2">
                    <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger rounded-pill fw-700 p-2">
                        <i class="fab fa-google me-2"></i> Tiếp tục với Google
                    </a>
                    <a th:href="@{/oauth2/authorization/github}" class="btn btn-outline-dark rounded-pill fw-700 p-2">
                        <i class="fab fa-github me-2"></i> Tiếp tục với GitHub
                    </a>
                </div>
                <div class="text-center mt-4">
                    <span class="text-muted">Chưa có tài khoản? </span>
                    <a href="/register" style="color:var(--primary);font-weight:700;text-decoration:none;">Đăng ký ngay</a>
                </div>
                <div class="text-center mt-3">
                    <a href="/" class="text-muted small"><i class="fas fa-home me-1"></i>Về trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
