<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thêm / Sửa Sản Phẩm - KidsFashion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; --sidebar:#2d3436; }
        body { font-family:'Nunito',sans-serif; background:#f8f9fa; }
        .sidebar { width:260px; min-height:100vh; background:var(--sidebar); position:fixed; left:0; top:0; z-index:100; }
        .sidebar-brand { font-family:'Pacifico',cursive; color:var(--primary); font-size:1.5rem; padding:24px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
        .sidebar-item { display:flex; align-items:center; padding:12px 20px; color:rgba(255,255,255,.7); text-decoration:none; font-weight:600; transition:.2s; border-left:3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { color:#fff; background:rgba(255,107,157,.15); border-left-color:var(--primary); }
        .sidebar-item i { width:24px; }
        .main-content { margin-left:260px; padding:24px; }
        .topbar { background:#fff; border-radius:16px; padding:16px 24px; margin-bottom:24px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .card { border:none; border-radius:16px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .form-control, .form-select { border-radius:10px; padding:10px 16px; border:2px solid #f0d0e0; }
        .form-control:focus, .form-select:focus { border-color:var(--primary); box-shadow:0 0 0 .25rem rgba(255,107,157,.15); }
        .btn-primary { background:var(--primary); border-color:var(--primary); border-radius:10px; padding:10px 24px; font-weight:700; }
        .btn-primary:hover { background:#e05587; border-color:#e05587; }
        label.form-label { font-weight:700; color:#444; }
        #imgPreview { max-height:200px; border-radius:12px; object-fit:cover; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">🧸 KidsFashion</div>
    <div class="py-2">
        <a href="/admin/dashboard" class="sidebar-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/products" class="sidebar-item active"><i class="fas fa-tshirt"></i> Quản lý sản phẩm</a>
        <a href="/admin/categories" class="sidebar-item"><i class="fas fa-tags"></i> Danh mục</a>
        <a href="/admin/orders" class="sidebar-item"><i class="fas fa-shopping-bag"></i> Đơn hàng</a>
        <a href="/admin/users" class="sidebar-item"><i class="fas fa-users"></i> Người dùng</a>
        <a href="/admin/discounts" class="sidebar-item"><i class="fas fa-percentage"></i> Mã giảm giá</a>
        <a href="/admin/statistics" class="sidebar-item"><i class="fas fa-chart-bar"></i> Thống kê</a>
        <hr style="border-color:rgba(255,255,255,.1);margin:12px 20px;"/>
        <a href="/" class="sidebar-item"><i class="fas fa-store"></i> Về cửa hàng</a>
        <a href="/logout" class="sidebar-item" style="color:#ff6b9d;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>
</div>

<div class="main-content">
    <div class="topbar d-flex justify-content-between align-items-center">
        <h5 class="mb-0 fw-800">
            <span th:if="${product.id == null}">➕ Thêm Sản Phẩm Mới</span>
            <span th:unless="${product.id == null}">✏️ Chỉnh Sửa Sản Phẩm</span>
        </h5>
        <a href="/admin/products" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-2"></i>Quay lại
        </a>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}"/>

                <div class="row g-4">
                    <!-- LEFT COLUMN -->
                    <div class="col-lg-8">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Áo thun Mickey dễ thương" required/>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Mô tả sản phẩm</label>
                                <textarea class="form-control" th:field="*{description}" rows="4" placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Giá bán (đ) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" th:field="*{price}" placeholder="150000" required min="0"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Giá gốc (đ)</label>
                                <input type="number" class="form-control" th:field="*{originalPrice}" placeholder="200000" min="0"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Số lượng tồn kho</label>
                                <input type="number" class="form-control" th:field="*{stockQuantity}" placeholder="50" min="0"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Kích cỡ</label>
                                <input type="text" class="form-control" th:field="*{size}" placeholder="S,M,L,XL"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Màu sắc</label>
                                <input type="text" class="form-control" th:field="*{color}" placeholder="Đỏ, Xanh, Vàng"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Độ tuổi phù hợp</label>
                                <input type="text" class="form-control" th:field="*{ageRange}" placeholder="2-5 tuổi"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Danh mục</label>
                                <select class="form-select" name="categoryId">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.id}"
                                            th:text="${cat.name}"
                                            th:selected="${product.category != null && product.category.id == cat.id}">Danh mục</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" th:field="*{active}" id="activeSwitch"/>
                                    <label class="form-check-label fw-700" for="activeSwitch">Đang bán</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check form-switch mt-2">
                                    <input class="form-check-input" type="checkbox" th:field="*{featured}" id="featuredSwitch"/>
                                    <label class="form-check-label fw-700" for="featuredSwitch">Sản phẩm nổi bật</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN - IMAGE -->
                    <div class="col-lg-4">
                        <label class="form-label">Hình ảnh sản phẩm</label>
                        <div class="border rounded-3 p-3 text-center" style="border:2px dashed #f0d0e0!important;">
                            <div id="imgPlaceholder" th:if="${product.imageUrl == null}" class="py-4">
                                <div style="font-size:4rem;">📷</div>
                                <p class="text-muted small mt-2">Chọn hình ảnh sản phẩm</p>
                            </div>
                            <img id="imgPreview" th:if="${product.imageUrl != null}" th:src="${product.imageUrl}"
                                 class="w-100 mb-3" alt="Product image"/>
                            <input type="file" class="form-control" name="imageFile" id="imageFile" accept="image/*"
                                   onchange="previewImage(this)"/>
                        </div>
                        <div class="mt-2 text-muted small">
                            <i class="fas fa-info-circle me-1"></i>Định dạng: JPG, PNG, WEBP. Tối đa 10MB.
                        </div>
                    </div>
                </div>

                <hr class="my-4"/>
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>
                        <span th:if="${product.id == null}">Thêm Sản Phẩm</span>
                        <span th:unless="${product.id == null}">Lưu Thay Đổi</span>
                    </button>
                    <a href="/admin/products" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                let preview = document.getElementById('imgPreview');
                const placeholder = document.getElementById('imgPlaceholder');
                if (!preview) {
                    preview = document.createElement('img');
                    preview.id = 'imgPreview';
                    preview.className = 'w-100 mb-3';
                    preview.style.cssText = 'max-height:200px;border-radius:12px;object-fit:cover;';
                    input.parentNode.insertBefore(preview, input);
                }
                preview.src = e.target.result;
                if (placeholder) placeholder.style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
