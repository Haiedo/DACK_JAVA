<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Quản Lý Mã Giảm Giá - KidsFashion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; --sidebar:#2d3436; }
        body { font-family:'Nunito',sans-serif; background:#f8f9fa; }
        .sidebar { width:260px; min-height:100vh; background:var(--sidebar); position:fixed; left:0; top:0; z-index:100; }
        .sidebar-brand { font-family:'Pacifico',cursive; color:var(--primary); font-size:1.5rem; padding:24px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
        .sidebar-item { display:flex; align-items:center; padding:12px 20px; color:rgba(255,255,255,.7); text-decoration:none; font-weight:600; transition:.2s; border-left:3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { color:#fff; background:rgba(255,107,157,.15); border-left-color:var(--primary); }
        .sidebar-item i { width:24px; }
        .main-content { margin-left:260px; padding:24px; }
        .topbar { background:#fff; border-radius:16px; padding:16px 24px; margin-bottom:24px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .card { border:none; border-radius:16px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .form-control, .form-select { border-radius:10px; padding:10px 16px; border:2px solid #f0d0e0; }
        .form-control:focus, .form-select:focus { border-color:var(--primary); box-shadow:0 0 0 .25rem rgba(255,107,157,.15); }
        .btn-primary { background:var(--primary); border-color:var(--primary); border-radius:10px; font-weight:700; color: white !important; }
        .table thead th { background:var(--primary); color:#fff; border:none; font-weight:700; padding:14px; }
        .code-badge { background:linear-gradient(135deg,#fff0f5,#ffe0ee); color:var(--primary); font-family:monospace; font-weight:800; padding:4px 12px; border-radius:8px; font-size:1rem; letter-spacing:1px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">🧸 KidsFashion</div>
    <div class="py-2">
        <a href="/admin/dashboard" class="sidebar-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/products" class="sidebar-item"><i class="fas fa-tshirt"></i> Sản phẩm</a>
        <a href="/admin/categories" class="sidebar-item"><i class="fas fa-tags"></i> Danh mục</a>
        <a href="/admin/orders" class="sidebar-item"><i class="fas fa-shopping-bag"></i> Đơn hàng</a>
        <a href="/admin/users" class="sidebar-item"><i class="fas fa-users"></i> Người dùng</a>
        <a href="/admin/discounts" class="sidebar-item active"><i class="fas fa-percentage"></i> Mã giảm giá</a>
        <a href="/admin/statistics" class="sidebar-item"><i class="fas fa-chart-bar"></i> Thống kê</a>
        <hr style="border-color:rgba(255,255,255,.1);margin:12px 20px;"/>
        <a href="/" class="sidebar-item"><i class="fas fa-store"></i> Về cửa hàng</a>
        <a href="/logout" class="sidebar-item" style="color:#ff6b9d;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>
</div>

<div class="main-content">
    <div class="topbar"><h5 class="mb-0 fw-800">🎫 Quản Lý Mã Giảm Giá</h5></div>
    <div th:if="${success}" class="alert alert-success mb-3" style="border-radius:12px;"><i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span></div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm sticky-top" style="top: 100px; z-index: 10;">
                <div class="card-body">
                    <h6 class="fw-800 mb-3" id="formTitle"><i class="fas fa-plus-circle me-2" style="color:var(--primary);"></i>Thiết lập mã</h6>
                    <form th:action="@{/admin/discounts/save}" th:object="${discount}" method="post" id="discountForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" th:field="*{id}" id="discountId"/>

                        <div class="mb-3">
                            <label class="form-label fw-700">Mã code</label>
                            <input type="text" class="form-control" th:field="*{code}" id="discountCode" required style="text-transform:uppercase;"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-700">Loại giảm giá</label>
                            <select class="form-select" th:field="*{discountType}" id="discountType">
                                <option value="PERCENTAGE">Phần trăm (%)</option>
                                <option value="FIXED_AMOUNT">Số tiền cố định (đ)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-700">Giá trị giảm</label>
                            <input type="number" class="form-control" th:field="*{discountValue}" id="discountValue" required min="0"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-700">Đơn tối thiểu (đ)</label>
                            <input type="number" class="form-control" th:field="*{minimumOrderAmount}" id="minAmount" min="0"/>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-700">Bắt đầu</label>
                                <input type="datetime-local" class="form-control" th:field="*{startDate}" id="startDate"/>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-700">Kết thúc</label>
                                <input type="datetime-local" class="form-control" th:field="*{endDate}" id="endDate"/>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" th:field="*{active}" id="isActive"/>
                                <label class="form-check-label fw-700">Kích hoạt</label>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100 py-2">Lưu mã</button>
                            <button type="button" class="btn btn-light rounded-pill" onclick="resetForm()" id="btnReset" style="display:none;">Hủy</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                            <tr>
                                <th>Mã</th>
                                <th>Giảm</th>
                                <th>Đơn tối thiểu</th>
                                <th>Hạn dùng</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="d : ${discounts}">
                                <td class="align-middle"><span class="code-badge" th:text="${d.code}"></span></td>
                                <td class="align-middle fw-bold" style="color:var(--primary);">
                                    <span th:text="${d.discountType == 'PERCENTAGE' ? d.discountValue + '%' : #numbers.formatDecimal(d.discountValue,0,'COMMA',0,'POINT') + 'đ'}"></span>
                                </td>
                                <td class="align-middle small" th:text="${#numbers.formatDecimal(d.minimumOrderAmount,0,'COMMA',0,'POINT')} + 'đ'"></td>
                                <td class="align-middle small text-muted">
                                    <span th:if="${d.endDate != null}" th:text="${#temporals.format(d.endDate, 'dd/MM/yyyy HH:mm')}"></span>
                                    <span th:unless="${d.endDate != null}">∞</span>
                                </td>
                                <td class="align-middle">
                                    <span th:class="${d.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                          th:text="${d.active ? 'Bật' : 'Tắt'}"></span>
                                </td>
                                <td class="align-middle">
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-sm btn-outline-primary border-0"
                                                th:onclick="editDiscount([[${d}]])">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <form th:action="@{/admin/discounts/delete/{id}(id=${d.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('Xóa mã này hả bác?')">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function editDiscount(discount) {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit me-2" style="color:var(--primary);"></i>Sửa mã: ' + discount.code;
        document.getElementById('discountId').value = discount.id;
        document.getElementById('discountCode').value = discount.code;
        document.getElementById('discountType').value = discount.discountType;
        document.getElementById('discountValue').value = discount.discountValue;
        document.getElementById('minAmount').value = discount.minimumOrderAmount;
        document.getElementById('isActive').checked = discount.active;

        // Xử lý ngày tháng (chuyển định dạng từ LocalDateTime sang ISO cho input)
        if (discount.startDate) document.getElementById('startDate').value = discount.startDate.substring(0, 16);
        if (discount.endDate) document.getElementById('endDate').value = discount.endDate.substring(0, 16);

        document.getElementById('btnReset').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('formTitle').innerHTML = '<i class="fas fa-plus-circle me-2" style="color:var(--primary);"></i>Tạo Mã Mới';
        document.getElementById('discountForm').reset();
        document.getElementById('discountId').value = '';
        document.getElementById('btnReset').style.display = 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
