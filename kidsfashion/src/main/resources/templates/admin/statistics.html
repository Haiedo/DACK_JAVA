<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thống Kê - KidsFashion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary:#ff6b9d; --sidebar:#2d3436; }
        body { font-family:'Nunito',sans-serif; background:#f8f9fa; }
        .sidebar { width:260px; min-height:100vh; background:var(--sidebar); position:fixed; left:0; top:0; z-index:100; }
        .sidebar-brand { font-family:'Pacifico',cursive; color:var(--primary); font-size:1.5rem; padding:24px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
        .sidebar-item { display:flex; align-items:center; padding:12px 20px; color:rgba(255,255,255,.7); text-decoration:none; font-weight:600; transition:.2s; border-left:3px solid transparent; }
        .sidebar-item:hover, .sidebar-item.active { color:#fff; background:rgba(255,107,157,.15); border-left-color:var(--primary); }
        .sidebar-item i { width:24px; }
        .main-content { margin-left:260px; padding:24px; }
        .topbar { background:#fff; border-radius:16px; padding:16px 24px; margin-bottom:24px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .stat-card {
            border: none;
            border-radius: 20px;
            padding: 24px;
            color: #fff;
            height: 100%; /* Đảm bảo lấp đầy chiều cao của cột */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Đẩy icon xuống dưới cùng cho đều */
            min-height: 160px; /* Cố định chiều cao tối thiểu để không bị bẹt */
        }
        .card { border:none; border-radius:16px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .stat-card { border:none; border-radius:20px; padding:24px; color:#fff; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-brand">🧸 KidsFashion</div>
    <div class="py-2">
        <a href="/admin/dashboard" class="sidebar-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="/admin/products" class="sidebar-item"><i class="fas fa-tshirt"></i> Quản lý sản phẩm</a>
        <a href="/admin/categories" class="sidebar-item"><i class="fas fa-tags"></i> Danh mục</a>
        <a href="/admin/orders" class="sidebar-item"><i class="fas fa-shopping-bag"></i> Đơn hàng</a>
        <a href="/admin/users" class="sidebar-item"><i class="fas fa-users"></i> Người dùng</a>
        <a href="/admin/discounts" class="sidebar-item"><i class="fas fa-percentage"></i> Mã giảm giá</a>
        <a href="/admin/statistics" class="sidebar-item active"><i class="fas fa-chart-bar"></i> Thống kê</a>
        <hr style="border-color:rgba(255,255,255,.1);margin:12px 20px;"/>
        <a href="/" class="sidebar-item"><i class="fas fa-store"></i> Về cửa hàng</a>
        <a href="/logout" class="sidebar-item" style="color:#ff6b9d;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>
</div>

<div class="main-content">
    <div class="topbar"><h5 class="mb-0 fw-800">📊 Thống Kê & Báo Cáo</h5></div>

    <!-- STAT CARDS -->
    <div class="row g-4 mb-4">
        <div class="col-6 col-lg-3">
            <div class="stat-card h-100" style="background:linear-gradient(135deg,#ff6b9d,#ff8fab);">
                <div>
                    <p class="mb-1 opacity-75 small fw-600">TỔNG DOANH THU</p>
                    <h3 class="fw-900 mb-0" th:text="${#numbers.formatDecimal(stats.totalRevenue ?: 0,0,'COMMA',0,'POINT')} + 'đ'" style="font-size:1.2rem;">0đ</h3>
                </div>
                <i class="fas fa-coins mt-3 opacity-75 fs-4"></i>
            </div>
        </div>

        <div class="col-6 col-lg-3">
            <div class="stat-card h-100" style="background:linear-gradient(135deg,#06d6a0,#00b894);">
                <div>
                    <p class="mb-1 opacity-75 small fw-600">DOANH THU THÁNG NÀY</p>
                    <h3 class="fw-900 mb-0" th:text="${#numbers.formatDecimal(stats.monthRevenue ?: 0, 0, 'COMMA', 0, 'POINT')} + 'đ'" style="font-size:1.2rem;">0đ</h3>
                </div>
                <i class="fas fa-calendar-check mt-3 opacity-75 fs-4"></i>
            </div>
        </div>

        <div class="col-6 col-lg-3">
            <div class="stat-card h-100" style="background:linear-gradient(135deg,#74b9ff,#0984e3);">
                <div>
                    <p class="mb-1 opacity-75 small fw-600">TỔNG SẢN PHẨM</p>
                    <h3 class="fw-900 mb-0" th:text="${totalProducts}" style="font-size:2rem;">0</h3>
                </div>
                <i class="fas fa-tshirt mt-3 opacity-75 fs-4"></i>
            </div>
        </div>

        <div class="col-6 col-lg-3">
            <div class="stat-card h-100" style="background:linear-gradient(135deg,#a29bfe,#6c5ce7);">
                <div>
                    <p class="mb-1 opacity-75 small fw-600">TỔNG NGƯỜI DÙNG</p>
                    <h3 class="fw-900 mb-0" th:text="${totalUsers}" style="font-size:2rem;">0</h3>
                </div>
                <i class="fas fa-users mt-3 opacity-75 fs-4"></i>
            </div>
        </div>
    </div>

    <!-- ORDER STATUS CHART + REVENUE CHART -->
    <div class="row g-4 mb-4">
        <div class="col-md-5">
            <div class="card p-4">
                <h6 class="fw-800 mb-3">📦 Trạng Thái Đơn Hàng</h6>
                <div style="height: 300px; position: relative;">
                    <canvas id="orderStatusChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card p-4">
                <h6 class="fw-800 mb-3">💰 Doanh Thu Theo Tháng</h6>
                <div style="height: 300px; position: relative;">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    /*<![CDATA[*/
    // 1. Biểu đồ Trạng thái đơn hàng
    const pending = [[${stats.pendingOrders ?: 0}]];
    const delivered = [[${stats.deliveredOrders ?: 0}]];

    // Tính toán số đơn đang xử lý hoặc gán mặc định
    const other = 0;

    const ctxOrder = document.getElementById('orderStatusChart');
    if (ctxOrder) {
        new Chart(ctxOrder, {
            type: 'doughnut',
            data: {
                labels: ['Chờ xác nhận', 'Đã giao hàng', 'Khác'],
                datasets: [{
                    data: [pending, delivered, other],
                    backgroundColor: ['#ffd166', '#06d6a0', '#74b9ff'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } },
                cutout: '70%'
            }
        });
    }

    // 2. Biểu đồ Doanh thu (Sửa lỗi cú pháp dòng 97)
    // Dùng syntax này để an toàn tuyệt đối trong Thymeleaf
    const revenueData = [[${stats.monthlyRevenueList}]] || Array(12).fill(0);

    const ctxRevenue = document.getElementById('revenueChart');
    if (ctxRevenue) {
        new Chart(ctxRevenue, {
            type: 'bar',
            data: {
                labels: ['T1', 'T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'T8', 'T9', 'T10', 'T11', 'T12'],
                datasets: [{
                    label: 'Doanh thu (đ)',
                    data: revenueData,
                    backgroundColor: 'rgba(255, 107, 157, 0.7)',
                    borderColor: '#ff6b9d',
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) { return value.toLocaleString('vi-VN') + 'đ'; }
                        }
                    }
                }
            }
        });
    }
    /*]]>*/
</script>
</body>
</html>
