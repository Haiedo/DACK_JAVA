<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main_layout(~{::section}, 'Cửa Hàng', ~{::extraStyles})}">
<head>
    <th:block th:fragment="extraStyles">
        <style>
            /* CSS RIÊNG CHO TRANG SHOP */
            .category-chip {
                border-radius:50px; padding:8px 20px; font-weight:700;
                border:2px solid #fff0f5; background:#fff; cursor:pointer;
                transition:.2s; display: inline-block;
            }
            .category-chip:hover, .category-chip.active {
                background:var(--primary); color:#fff!important; border-color:var(--primary);
            }
            .product-card { border:none; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); transition:all .3s; height:100%; }
            .product-card:hover { transform:translateY(-8px); box-shadow:0 12px 35px rgba(255,107,157,.25); }
            .product-img-wrap { position:relative; overflow:hidden; background:#fff0f5; height:230px; display:flex; align-items:center; justify-content:center; }
            .product-img-wrap img { width:100%; height:100%; object-fit:cover; transition: 0.5s; }
            .product-card:hover img { transform: scale(1.1); }

            .price-tag { color:var(--primary); font-weight:800; font-size:1.15rem; }
            .cart-btn {
                background:var(--primary); color:#fff; border:none; border-radius:50%;
                width:38px; height:38px; display:flex; align-items:center;
                justify-content:center; transition: 0.3s;
            }
            .cart-btn:hover { background:var(--primary-dark); transform: scale(1.1) rotate(15deg); }

            /* Animation cho thông báo */
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            .custom-toast {
                animation: slideInRight 0.4s ease-out;
                min-width: 280px;
            }
        </style>
    </th:block>
</head>
<body>

<section class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
        <div>
            <h2 class="fw-900 mb-1">🛍️ Khám Phá Cửa Hàng</h2>
            <p class="text-muted mb-0" th:text="${selectedCategory != null ? 'Đang xem: ' + selectedCategory.name : 'Tất cả các mẫu mới nhất cho bé'}"></p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a href="/shop" th:class="${selectedCategory == null ? 'category-chip active text-decoration-none' : 'category-chip text-decoration-none text-dark'}">Tất cả</a>
            <a th:each="cat : ${categories}" th:href="@{/shop(category=${cat.id})}" th:text="${cat.name}"
               th:class="${selectedCategory != null && selectedCategory.id == cat.id ? 'category-chip active text-decoration-none' : 'category-chip text-decoration-none text-dark'}"></a>
        </div>
    </div>

    <div th:if="${products.isEmpty()}" class="text-center py-5">
        <div style="font-size:5rem;">🔍</div>
        <h4 class="mt-3 text-muted fw-700">Rất tiếc bạn ơi, không tìm thấy sản phẩm nào!</h4>
        <a href="/shop" class="btn btn-primary mt-3 px-4 py-2">Quay lại cửa hàng</a>
    </div>

    <div class="row g-4" th:unless="${products.isEmpty()}">
        <div class="col-6 col-md-4 col-lg-3" th:each="product : ${products.content}">
            <div class="card product-card">
                <a th:href="@{/product/{id}(id=${product.id})}">
                    <div class="product-img-wrap">
                        <img th:src="${product.imageUrl}" th:alt="${product.name}"/>
                        <span th:if="${product.discountPercent > 0}" class="badge bg-danger position-absolute"
                              style="top:12px; left:12px; border-radius:10px; font-weight:800;"
                              th:text="'-' + ${product.discountPercent} + '%'"></span>
                    </div>
                </a>
                <div class="card-body p-3">
                    <div class="small text-muted mb-1" th:text="${product.category?.name}">Danh mục</div>
                    <h6 class="fw-700 text-truncate" th:text="${product.name}">Tên sản phẩm</h6>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <span class="price-tag" th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + 'đ'"></span>
                        <button class="cart-btn shadow-sm" th:onclick="addToCart([[${product.id}]])">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function addToCart(productId) {
            // Lấy CSRF Token từ layout
            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token = document.querySelector('meta[name="_csrf"]').content;

            const formData = new URLSearchParams();
            formData.append('productId', productId);
            formData.append('quantity', 1);

            fetch('/api/cart/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    [header]: token
                },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if(data.success){
                    // Cập nhật số trên Badge giỏ hàng
                    const cartBadge = document.querySelector('.cart-badge');
                    if (cartBadge) {
                        cartBadge.textContent = data.cartCount;
                        cartBadge.classList.remove('d-none');
                    }
                    // Hiện thông báo Toast thay vì alert
                    showNotification("Đã thêm sản phẩm vào giỏ hàng thành công!", "success");
                } else {
                    showNotification("Lỗi: " + data.message, "danger");
                }
            })
            .catch(err => {
                showNotification("Bạn cần đăng nhập để mua sắm!", "warning");
            });
        }

        function showNotification(message, type) {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? '#2ecc71' : (type === 'danger' ? '#e74c3c' : '#f1c40f');

            toast.className = 'custom-toast p-3 text-white position-fixed shadow-lg';
            toast.style.cssText = `top:100px; right:20px; z-index:9999; border-radius:15px; background:${bgColor}; font-weight:700;`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i> ${message}`;

            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 2500);
        }
    </script>
</section>
</body>
</html>
