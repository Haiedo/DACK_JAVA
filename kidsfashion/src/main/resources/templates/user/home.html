<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main_layout(~{::section}, 'Trang Chủ', ~{::extraStyles})}">
<head>
    <th:block th:fragment="extraStyles">
        <style>
            /* --- BIẾN MÀU CHỦ ĐẠO PINK --- */
            :root {
                --primary: #ff85a2;      /* Màu hồng chính */
                --primary-dark: #ff6b8d; /* Màu hồng đậm khi hover */
                --secondary: #7fb8ff;    /* Màu xanh baby cho nhãn giảm giá */
                --bg-soft: #fff8fb;      /* Màu nền hồng cực nhạt */
            }

            /* 1. CHỈNH NÚT ĐĂNG NHẬP THÀNH MÀU HỒNG (ĐỒNG BỘ HEADER) */
            /* Nhắm vào các nút primary trong navbar hoặc các nút có link login */
            .navbar .btn-primary,
            .header-links .btn-primary,
            .btn-login,
            a[href*='login'] {
                background-color: var(--primary) !important;
                border-color: var(--primary) !important;
                color: white !important;
                border-radius: 50px !important;
                padding: 8px 22px !important;
                font-weight: 700 !important;
                transition: all 0.3s ease !important;
                border: none !important;
            }

            .navbar .btn-primary:hover,
            .btn-login:hover,
            a[href*='login']:hover {
                background-color: var(--primary-dark) !important;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(255, 133, 162, 0.3);
            }

            /* 2. CSS BANNER HERO */
            .hero {
                background: linear-gradient(135deg, #fff0f5 0%, #ffe8f0 50%, #fff5e0 100%);
                padding: 100px 0;
                position: relative;
                overflow: hidden;
            }

            .hero::before { content: '✨'; position: absolute; top: 15%; left: 5%; font-size: 1.5rem; opacity: 0.4; animation: float 4s infinite; }
            .hero::after { content: '🎈'; position: absolute; bottom: 10%; right: 10%; font-size: 2.5rem; opacity: 0.3; animation: float 5s infinite; }

            .hero h1 { font-size: 3.8rem; font-weight: 900; color: #2d3436; line-height: 1.2; }
            .hero h1 span { color: var(--primary); position: relative; display: inline-block; }

            /* Gạch chân lượn sóng cho chữ Trẻ Em */
            .hero h1 span::after {
                content: '〰️'; position: absolute; bottom: -12px; left: 0; width: 100%; color: var(--secondary); font-size: 1.2rem;
            }

            .btn-hero {
                background: var(--primary); color: white; border: none; border-radius: 50px;
                padding: 15px 40px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase;
                box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3); transition: all 0.3s ease;
                text-decoration: none; display: inline-block; margin-top: 30px;
            }
            .btn-hero:hover {
                background: var(--primary-dark); transform: translateY(-3px);
                box-shadow: 0 15px 25px rgba(255, 107, 157, 0.4); color: white;
            }

            .hero-img-wrap { position: relative; z-index: 2; }
            .hero-img-wrap img {
                width: 100%; max-width: 480px; border-radius: 30px;
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); border: 12px solid white;
                transition: transform 0.5s ease;
            }
            .hero-img-wrap:hover img { transform: scale(1.02) rotate(1deg); }

            .hero-bg-circle {
                position: absolute; top: -30px; right: -30px; width: 300px; height: 300px;
                background: var(--primary); border-radius: 50%; opacity: 0.1; z-index: 1;
            }

            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-15px); }
            }

            /* 3. CARD SẢN PHẨM & NHÃN GIẢM GIÁ */
            .product-card { border:none; border-radius:20px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); transition:all .3s; height:100%; background: #fff; }
            .product-card:hover { transform:translateY(-8px); box-shadow:0 12px 35px rgba(255,107,157,.25); }

            .product-img-wrap {
                position:relative;
                overflow:hidden;
                background:#fff;
                height:230px;
                display:flex;
                align-items:center;
                justify-content:center;
            }
            .product-img-wrap img { width:100%; height:100%; object-fit:cover; transition: 0.5s; }
            .product-card:hover .product-img-wrap img { transform: scale(1.1); }

            /* FIX NHÃN GIẢM GIÁ NẰM ĐÈ LÊN ẢNH */
            .discount-badge {
                position: absolute;
                top: 12px;
                right: 12px;
                background: var(--secondary); /* Màu xanh baby */
                color: white;
                padding: 3px 10px;
                border-radius: 50px;
                font-weight: 800;
                font-size: 0.8rem;
                z-index: 10;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }

            .price-tag { color:var(--primary); font-weight:800; font-size:1.15rem; }
            .cart-btn { background:var(--primary); color:#fff; border:none; border-radius:50%; width:38px; height:38px; display:flex; align-items:center; justify-content:center; transition:.2s; }
            .cart-btn:hover { background: var(--primary-dark); transform: scale(1.1); }

            .service-box { position: relative; border-radius: 20px; overflow: hidden; height: 260px; margin-bottom: 20px; }
            .service-box img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
            .service-box-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 20px; color: white; }
        </style>
    </th:block>
</head>
<body>

<section>
    <div class="hero">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-7 text-center text-lg-start">
                    <p class="text-uppercase fw-bold text-primary mb-2" style="letter-spacing: 2px;">🧸 BST Mới Nhất 2026</p>
                    <h1>Thời Trang <span>Trẻ Em</span><br/>Xinh Xắn & Theo Xu Hướng</h1>
                    <p class="lead text-muted mt-4">Khám phá hàng trăm mẫu quần áo đẹp, chất liệu an toàn và thoải mái nhất cho bé yêu của bạn.</p>
                    <a href="/shop" class="btn-hero">Mua Sắm Ngay <i class="fas fa-arrow-right ms-2"></i></a>
                </div>

                <div class="col-lg-5 text-center d-none d-lg-block position-relative">
                    <div class="hero-bg-circle"></div>
                    <div class="hero-img-wrap">
                        <img th:src="@{/images/story1.jpg}" alt="KidsFashion" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="py-5 bg-white">
        <div class="container">
            <div id="newHeroCarousel" class="carousel slide mb-5" data-bs-ride="carousel" style="border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
                <div class="carousel-inner">
                    <div class="carousel-item active"><img th:src="@{/images/slide1.jpg}" class="d-block w-100" style="height: 420px; object-fit: cover;"></div>
                    <div class="carousel-item"><img th:src="@{/images/slide2.jpg}" class="d-block w-100" style="height: 420px; object-fit: cover;"></div>
                    <div class="carousel-item"><img th:src="@{/images/slide3.jpg}" class="d-block w-100" style="height: 420px; object-fit: cover;"></div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-4" th:each="i : ${#numbers.sequence(1,3)}">
                    <div class="service-box shadow-sm">
                        <img th:src="@{'/images/story' + ${i} + '.jpg'}">
                        <div class="service-box-overlay">
                            <h4 class="fw-bold" th:text="${i==1?'Chuyện Của Bé':(i==2?'Giới thiệu':'Liên hệ')}"></h4>
                            <div style="width: 40px; height: 3px; background: var(--primary); border-radius: 2px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="py-5" style="background: var(--bg-soft);">
        <div class="container">
            <h2 class="text-center mb-5" style="font-weight: 800; color: #2d3436;">🌟 Sản Phẩm Nổi Bật</h2>
            <div class="row g-4">
                <div class="col-6 col-md-4 col-lg-3" th:each="p : ${featuredProducts}">
                    <div class="card product-card">
                        <div class="product-img-wrap">
                            <a th:href="@{/product/{id}(id=${p.id})}" style="width: 100%; height: 100%;">
                                <img th:src="${p.imageUrl ?: '/images/default.png'}" class="img-fluid">
                                <span th:if="${p.discountPercent > 0}" class="discount-badge" th:text="'-' + ${p.discountPercent} + '%'"></span>
                            </a>
                        </div>
                        <div class="card-body">
                            <h6 class="fw-bold text-truncate" th:text="${p.name}">Tên SP</h6>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <span class="price-tag" th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + 'đ'"></span>
                                <button type="button" class="cart-btn" th:onclick="|addToCart('${p.id}')|"><i class="fas fa-cart-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const myCarousel = document.querySelector('#newHeroCarousel');
            if (myCarousel) {
                new bootstrap.Carousel(myCarousel, { interval: 3000, ride: 'carousel' });
            }
        });

        function addToCart(productId) {
            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token = document.querySelector('meta[name="_csrf"]').content;
            fetch('/api/cart/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', [header]: token },
                body: `productId=${productId}&quantity=1`
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const badge = document.querySelector('.cart-badge');
                    if (badge) { badge.textContent = data.cartCount; badge.classList.remove('d-none'); }
                    showToast("Thêm vào giỏ hàng thành công!", "success");
                } else { showToast("Lỗi: " + data.message, "danger"); }
            }).catch(err => { showToast("Bạn cần đăng nhập để mua hàng!", "warning"); });
        }

        function showToast(message, type) {
            const toastEl = document.getElementById('cartToast');
            const toastMsg = document.getElementById('toastMsg');
            if(toastEl && toastMsg) {
                toastEl.className = `toast align-items-center text-white bg-${type} border-0`;
                toastMsg.textContent = message;
                const toast = new bootstrap.Toast(toastEl);
                toast.show();
            }
        }
    </script>
</section>
</body>
</html>
