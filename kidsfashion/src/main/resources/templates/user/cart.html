<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main_layout(~{::section}, 'Giỏ Hàng', ~{::extraStyles})}">
<head>
    <th:block th:fragment="extraStyles">
        <style>
            /* --- GIỮ NGUYÊN CSS GỐC CỦA BÁC --- */
            :root { --primary:#ff6b9d; --primary-dark:#e05587; --secondary:#ffd166; --accent:#06d6a0; }
            .cart-container { background: #fcfcfc; min-height: 80vh; padding-top: 30px; }
            .card-cart { border: none; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); background: #fff; overflow: hidden; }
            .cart-item { transition: all 0.3s; border-radius: 15px; margin-bottom: 10px; border-bottom: 1px solid #f1f1f1; }
            .cart-item:hover { background: #fff8fb; }
            .cart-item-img { width: 90px; height: 90px; object-fit: cover; border-radius: 15px; background: #fff0f5; }
            .qty-group { background: #f8f9fa; border-radius: 50px; padding: 5px; display: inline-flex; align-items: center; }
            .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.2s; cursor: pointer; }
            .qty-btn:hover { background: var(--primary); color: white; }
            .price-tag-cart { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
            .promo-box { background: #fff0f5; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 1px dashed var(--primary); }
            .btn-checkout-final { background: var(--primary) !important; border: none !important; border-radius: 50px !important; padding: 15px !important; font-weight: 800 !important; color: white !important; box-shadow: 0 4px 15px rgba(255,107,157,0.3); width: 100%; transition: 0.3s; }
            .btn-checkout-final:hover { background: var(--primary-dark) !important; transform: translateY(-2px); }
            .cart-checkbox:checked { background-color: var(--primary); border-color: var(--primary); }
        </style>
    </th:block>
</head>
<body>

<section class="cart-container">
    <div class="container">
        <div class="d-flex align-items-center mb-4">
            <h3 class="fw-900 mb-0">🛒 Giỏ Hàng Của Bạn</h3>
        </div>

        <div th:if="${#lists.isEmpty(cartItems)}" class="card-cart py-5 text-center">
            <div class="card-body">
                <div style="font-size: 5rem;">🧸</div>
                <h4 class="fw-700 mt-3 text-muted">Giỏ hàng đang trống bạn ơi!</h4>
                <a href="/shop" class="btn btn-primary rounded-pill px-5 mt-3">Mua Sắm Ngay</a>
            </div>
        </div>

        <div th:unless="${#lists.isEmpty(cartItems)}">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card-cart mb-3 p-3">
                        <div class="form-check d-flex align-items-center">
                            <input class="form-check-input cart-checkbox me-2" type="checkbox" id="selectAll" checked>
                            <label class="form-check-label fw-800 text-muted" for="selectAll">Chọn tất cả sản phẩm</label>
                        </div>
                    </div>

                    <div class="card-cart">
                        <div class="card-body p-0">
                            <div th:each="item : ${cartItems}" class="cart-item d-flex align-items-center gap-3 p-3"
                                 th:id="'item-row-' + ${item.id}"
                                 th:data-id="${item.id}" th:data-price="${item.product.price}" th:data-qty="${item.quantity}">

                                <input class="form-check-input cart-checkbox item-checkbox ms-1" type="checkbox" checked th:value="${item.id}">

                                <img th:src="${item.product.imageUrl ?: '/images/default.png'}" class="cart-item-img shadow-sm"/>

                                <div class="flex-grow-1">
                                    <h6 class="fw-700 mb-1" th:text="${item.product.name}">Tên SP</h6>
                                    <div class="price-tag-cart" th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + 'đ'"></div>
                                </div>

                                <div class="qty-group">
                                    <button type="button" class="qty-btn" th:onclick="changeQty([[${item.id}]], -1)">−</button>
                                    <span class="fw-800 px-3" th:id="'qty-' + ${item.id}" th:text="${item.quantity}">1</span>
                                    <button type="button" class="qty-btn" th:onclick="changeQty([[${item.id}]], 1)">+</button>
                                </div>

                                <div class="text-end fw-800 d-none d-md-block" style="min-width:100px;" th:id="'sub-' + ${item.id}"
                                     th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + 'đ'">
                                </div>

                                <button type="button" th:onclick="removeItem([[${item.id}]])" class="btn btn-link text-danger p-2">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="sticky-top" style="top:100px; z-index: 10;">
                        <div class="card-cart promo-box mb-3">
                            <label class="fw-800 mb-2 small text-uppercase text-muted">Mã giảm giá</label>
                            <div class="input-group">
                                <input type="text" id="couponCode" class="form-control border-0 shadow-none" placeholder="Nhập mã tại đây...">
                                <button class="btn btn-primary" type="button" onclick="applyCoupon()">Áp dụng</button>
                            </div>
                            <div id="couponMsg" class="small mt-2" style="display:none;"></div>
                        </div>

                        <div class="card-cart p-4">
                            <h5 class="fw-800 mb-4 border-bottom pb-2">💰 Hóa đơn</h5>
                            <div class="d-flex justify-content-between mb-3 text-muted">
                                <span>Tạm tính (<span id="selectedCount">0</span> SP):</span>
                                <span class="fw-700 text-dark" id="tempTotal">0đ</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3 text-success" id="discountArea" style="display:none;">
                                <span>Giảm giá:</span>
                                <span class="fw-700" id="discountAmt">-0đ</span>
                            </div>
                            <hr class="my-4">
                            <div class="d-flex justify-content-between mb-4">
                                <span class="fw-800 fs-4">Tổng tiền:</span>
                                <span class="fw-900 fs-4 text-danger" id="grandTotal">0đ</span>
                            </div>

                            <form id="checkoutForm" action="/checkout" method="get">
                                <input type="hidden" name="itemIds" id="selectedItemIds">
                                <input type="hidden" name="coupon" id="appliedCoupon">
                                <button type="submit" id="btnCheckout" class="btn btn-checkout-final shadow">
                                    THANH TOÁN NGAY <i class="fas fa-chevron-right ms-2"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        let appliedCouponCode = "";

        function updateSummary() {
            let total = 0;
            let countSelected = 0; // Đây sẽ là tổng số lượng (Sum of Quantity)
            let selectedIds = [];

            document.querySelectorAll('.cart-item').forEach(row => {
                const cb = row.querySelector('.item-checkbox');
                if (cb && cb.checked) {
                    const price = parseFloat(row.getAttribute('data-price'));
                    const qty   = parseInt(row.getAttribute('data-qty'));

                    total += price * qty;
                    // SỬA DÒNG NÀY: Thay vì ++, ta cộng dồn số lượng của từng loại
                    countSelected += qty;

                    selectedIds.push(cb.value);
                }
            });

            document.getElementById('tempTotal').textContent    = formatVND(total);
            document.getElementById('selectedCount').textContent = countSelected;
            document.getElementById('selectedItemIds').value    = selectedIds.join(',');
            document.getElementById('btnCheckout').disabled     = (countSelected === 0);

            const selectAll = document.getElementById('selectAll');
            if (selectAll) {
                const allCb      = document.querySelectorAll('.item-checkbox');
                const allChecked = document.querySelectorAll('.item-checkbox:checked');
                selectAll.checked = allCb.length > 0 && allCb.length === allChecked.length;
            }

            // Nếu đang có mã thì gọi lại server để tính giảm giá với tổng mới
            if (appliedCouponCode) {
                recalcDiscount(total);
            } else {
                document.getElementById('grandTotal').textContent = formatVND(total);
                document.getElementById('discountArea').style.setProperty('display', 'none', 'important');
            }
        }

        function recalcDiscount(total) {
            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token  = document.querySelector('meta[name="_csrf"]').content;

            fetch(`/api/discount/apply?code=${appliedCouponCode}&orderAmount=${total}`, {
                method: 'POST',
                headers: { [header]: token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const discount = data.discountAmount || 0;
                    const final    = data.finalAmount || (total - discount);

                    document.getElementById('grandTotal').textContent  = formatVND(final);
                    document.getElementById('discountArea').style.setProperty('display', 'flex', 'important');
                    document.getElementById('discountAmt').textContent = "-" + formatVND(discount);
                } else {
                    // Mã không còn hợp lệ (VD: đơn dưới mức tối thiểu)
                    appliedCouponCode = "";
                    document.getElementById('appliedCoupon').value = "";
                    document.getElementById('couponCode').value    = "";
                    document.getElementById('grandTotal').textContent = formatVND(total);
                    document.getElementById('discountArea').style.setProperty('display', 'none', 'important');

                    const msg = document.getElementById('couponMsg');
                    msg.style.display = "block";
                    msg.className = "small mt-2 text-danger fw-bold text-center p-2 bg-light rounded";
                    msg.innerHTML = `<i class="fas fa-info-circle"></i> Mã bị hủy do đơn hàng không đủ điều kiện`;
                }
            })
            .catch(() => {
                // Lỗi mạng: giữ nguyên tổng, ẩn giảm giá
                document.getElementById('grandTotal').textContent = formatVND(total);
            });
        }

        function changeQty(id, delta) {
            const span = document.getElementById('qty-' + id);
            const row  = document.getElementById('item-row-' + id);
            let newQty = parseInt(span.textContent) + delta;
            if (newQty < 1) return;

            span.textContent = newQty;
            row.setAttribute('data-qty', newQty);
            const price = parseFloat(row.getAttribute('data-price'));
            document.getElementById('sub-' + id).textContent = formatVND(price * newQty);

            updateSummary();

            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token  = document.querySelector('meta[name="_csrf"]').content;
            fetch('/api/cart/update-qty', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', [header]: token },
                body: `itemId=${id}&quantity=${newQty}`
            });
        }

        function applyCoupon() {
            const code  = document.getElementById('couponCode').value.trim();
            const total = parseFloat(
                document.getElementById('tempTotal').textContent.replace(/[^0-9]/g, '')
            );
            if (!code) return;

            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token  = document.querySelector('meta[name="_csrf"]').content;

            fetch(`/api/discount/apply?code=${code}&orderAmount=${total}`, {
                method: 'POST',
                headers: { [header]: token }
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById('couponMsg');
                if (data.success) {
                    appliedCouponCode = code;
                    document.getElementById('appliedCoupon').value = code;

                    const discount = data.discountAmount || 0;
                    const final    = data.finalAmount || (total - discount);

                    document.getElementById('grandTotal').textContent  = formatVND(final);
                    document.getElementById('discountArea').style.setProperty('display', 'flex', 'important');
                    document.getElementById('discountAmt').textContent = "-" + formatVND(discount);

                    msg.style.display = "block";
                    msg.className = "small mt-2 text-success fw-bold";
                    msg.innerHTML = `<i class="fas fa-check-circle"></i> ${data.message || 'Áp dụng thành công!'}`;
                } else {
                    alert(data.message || 'Mã không hợp lệ!');
                }
            });
        }

        function removeItem(id) {
            if (!confirm('Xóa sản phẩm này hả bạn?')) return;
            const header = document.querySelector('meta[name="_csrf_header"]').content;
            const token  = document.querySelector('meta[name="_csrf"]').content;
            fetch('/api/cart/remove', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', [header]: token },
                body: `itemId=${id}`
            }).then(() => {
                document.getElementById('item-row-' + id).remove();
                updateSummary();
            });
        }

        function formatVND(n) { return Math.round(n).toLocaleString('vi-VN') + 'đ'; }

        document.addEventListener('DOMContentLoaded', () => {
            document.body.addEventListener('change', e => {
                if (e.target.classList.contains('item-checkbox') || e.target.id === 'selectAll') {
                    if (e.target.id === 'selectAll') {
                        document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = e.target.checked);
                    }
                    updateSummary();
                }
            });
            updateSummary();
        });
    </script>
</section>
</body>
</html>
