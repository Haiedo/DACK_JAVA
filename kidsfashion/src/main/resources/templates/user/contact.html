<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main_layout(~{::section}, 'Liên Hệ', ~{::extraStyles})}">
<head>
    <th:block th:fragment="extraStyles">
        <style>
            .contact-info-card { border-radius: 20px; transition: all 0.3s; }
            .contact-info-card:hover { background: #fff0f5; transform: translateY(-5px); }
            .fw-900 { font-weight: 900; }
        </style>
    </th:block>
</head>
<body>
<section class="py-5">
    <div class="container">
        <a href="/" class="btn btn-outline-danger rounded-pill mb-4">
            <i class="fas fa-arrow-left me-2"></i> Quay lại trang chủ
        </a>

        <div class="row g-5">
            <div class="col-md-5">
                <h1 class="fw-900 mb-4" style="color: var(--primary);">Liên Hệ Với Chúng Tôi</h1>

                <div class="contact-info-card d-flex align-items-center p-3 mb-3 border shadow-sm">
                    <div class="bg-primary text-white rounded-circle p-3 me-3">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">Điện thoại</h6>
                        <p class="text-muted mb-0">0901 234 567</p>
                    </div>
                </div>

                <div class="contact-info-card d-flex align-items-center p-3 mb-3 border shadow-sm">
                    <div class="bg-primary text-white rounded-circle p-3 me-3">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">Email</h6>
                        <p class="text-muted mb-0">support@kidsfashion.com</p>
                    </div>
                </div>

                <div class="contact-info-card d-flex align-items-center p-3 mb-3 border shadow-sm">
                    <div class="bg-primary text-white rounded-circle p-3 me-3">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">Địa chỉ</h6>
                        <p class="text-muted mb-0">45 Nguyễn Kiệm, Gò Vấp, TP.HCM</p>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <img th:src="@{/images/story2detail.jpg}" class="img-fluid rounded-4 shadow" alt="Contact">
            </div>
        </div>
    </div>
</section>
</body>
</html>
