<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thanh Toán - KidsFashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; --primary-light: #fff0f5; }
        body { font-family:'Nunito',sans-serif; background:#fdfafb; color: #444; }
        .navbar-brand { font-family:'Pacifico',cursive; color:var(--primary)!important; font-size:1.8rem; }
        .navbar { background:#fff!important; box-shadow:0 2px 15px rgba(255,107,157,.15); }

        .card { border:none; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.04); background: #fff; }
        .form-control { border-radius:12px; padding:12px 16px; border:2px solid #f1f3f5; }

        .btn-primary { background:var(--primary); border:none; border-radius:50px; font-weight:800; padding:16px; color:white !important; }
        .btn-primary:hover { background:#e05587; }

        .cart-mini-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; margin-top: 3px}
        .img-container {
            position: relative;
            width: 65px;
            height: 65px;
            flex-shrink: 0;
            display: block;
        }
        .cart-mini-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .qty-badge {
            position: absolute; top: -8px; right: -8px;
            background: #333; color: white; border-radius: 50%;
            width: 22px; height: 22px; font-size: 11px;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid white; font-weight: 800; z-index: 5;
        }
        .item-info { flex-grow: 1; min-width: 0; }
        .item-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; color: #333; }
        .item-price { color: var(--primary); font-weight: 800; font-size: 0.85rem; }

        .payment-option {
            border: 2px solid #f1f3f5;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 100px;
            background: #fff;
        }
        .payment-option:hover {
            border-color: #ffe0ee;
            background-color: #fffafa;
        }
        .payment-option.selected {
            border-color: var(--primary);
            background-color: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.1);
        }
        .section-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 20px; display: flex; align-items: center; color: var(--primary); }
        .cart-items-list { max-height: 350px; overflow-y: auto; padding-right: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🧸 KidsFashion</a>
        <div class="ms-auto">
            <a href="/cart" class="btn btn-outline-secondary rounded-pill btn-sm">Quay lại giỏ hàng</a>
        </div>
    </div>
</nav>

<div class="container py-2">
    <form th:action="@{/checkout/place-order}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" name="customerEmail" th:value="${user?.email}" />

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card sticky-top" style="top:90px;">
                    <div class="card-body p-4">
                        <div class="section-title"><i class="fas fa-shopping-basket me-2"></i> Đơn hàng của bạn</div>

                        <div class="cart-items-list mb-4">
                            <div th:each="item : ${cartItems}" class="cart-mini-item">
                                <div class="img-container" th:with="pImg=${item.product.imageUrl}">
                                    <img th:src="${pImg != null && !pImg.isEmpty() ?
                                         (pImg.startsWith('http') ? pImg :
                                         (pImg.startsWith('/') ? pImg : '/uploads/images/' + pImg))
                                         : '/images/default.png'}"
                                         class="cart-mini-img"
                                         style="width: 65px; height: 65px; object-fit: cover; border-radius: 12px; border: 1px solid #eee;">

                                    <span class="qty-badge"
                                          style="position: absolute; top: -5px; right: -5px; background: #ff4757; color: white;
                                            font-size: 10px; padding: 2px 6px; border-radius: 50%; border: 2px solid #fff;"
                                          th:text="${item.quantity}">1</span>
                                </div>
                                <div class="item-info text-truncate">
                                    <div class="item-name text-truncate" th:text="${item.product.name}">Tên sản phẩm</div>
                                    <div class="item-price" th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + 'đ'">0đ</div>
                                </div>
                            </div>
                        </div>

                        <hr/>

                        <div class="summary-details">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Tạm tính:</span>
                                <span class="fw-700" th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + 'đ'">0đ</span>
                            </div>

                            <div class="d-flex justify-content-between mb-2 text-danger" th:if="${discountAmount > 0}">
                                <span>Giảm giá:</span>
                                <span class="fw-700" th:text="'-' + ${#numbers.formatDecimal(discountAmount,0,'COMMA',0,'POINT')} + 'đ'">-0đ</span>
                            </div>

                            <input type="hidden" name="discountCode" th:value="${appliedCoupon}" />

                            <div class="d-flex justify-content-between mb-2 text-success">
                                <span>Phí vận chuyển:</span>
                                <span class="fw-700">Miễn phí 🎉</span>
                            </div>
                            <hr/>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-800 fs-5">Tổng tiền:</span>
                                <span th:text="${#numbers.formatDecimal(total - (discountAmount ?: 0), 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card mb-4 p-4">
                    <div class="section-title"><i class="fas fa-truck me-2"></i> Địa chỉ giao hàng</div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Họ tên người nhận <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="customerName" th:value="${user?.fullName}" required placeholder="Bạn nhập tên nhé...">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Số điện thoại <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" name="customerPhone" th:value="${user?.phone}" required placeholder="Số phone của bạn...">
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Địa chỉ chi tiết <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="shippingAddress" rows="2" th:text="${user?.address}" required placeholder="Số nhà, tên đường, Phường/Xã..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="card p-4 mb-4 shadow-sm border-0" style="border-radius: 20px;">
                    <div class="section-title mb-4">
                        <i class="fas fa-credit-card me-2"></i>
                        <span class="fw-800">Phương thức thanh toán</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="payment-option d-flex flex-column align-items-center justify-content-center text-center p-3 w-100" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="COD" checked class="d-none">
                                <i class="fas fa-money-bill-wave fa-2x mb-2 text-success"></i>
                                <div class="fw-bold small">Tiền mặt (COD)</div>
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="payment-option d-flex flex-column align-items-center justify-content-center text-center p-3 w-100" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="BANK_TRANSFER" class="d-none">
                                <i class="fas fa-university fa-2x mb-2 text-primary"></i>
                                <div class="fw-bold small">Chuyển khoản</div>
                            </label>
                        </div>
                        <div class="col-md-4">
                            <label class="payment-option d-flex flex-column align-items-center justify-content-center text-center p-3 w-100" onclick="selectPayment(this)">
                                <input type="radio" name="paymentMethod" value="MOMO" class="d-none">
                                <i class="fas fa-wallet fa-2x mb-2" style="color: #ae2070;"></i>
                                <div class="fw-bold small">Ví MoMo</div>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 shadow-lg fs-5">XÁC NHẬN ĐẶT HÀNG NGAY</button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function selectPayment(el) {
        document.querySelectorAll('.payment-option').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        el.querySelector('input').checked = true;
    }
    // Tự động chọn COD khi load
    document.addEventListener('DOMContentLoaded', () => {
        const cod = document.querySelector('.payment-option');
        if(cod) cod.classList.add('selected');
    });
</script>
</body>
</html>
