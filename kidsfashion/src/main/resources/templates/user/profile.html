<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: main_layout(~{::section}, 'Hồ sơ của ban', ~{::extraStyles})}">
<head>
    <th:block th:fragment="extraStyles">
        <style>
            .profile-card { border: none; border-radius: 30px; box-shadow: 0 15px 35px rgba(255,107,157,0.1); background: #fff; overflow: hidden; }
            .profile-header { background: linear-gradient(45deg, var(--primary), #ff9eb5); padding: 40px; color: white; text-align: center; }
            .avatar-box { width: 130px; height: 130px; border: 5px solid white; border-radius: 50%; margin: 0 auto 15px; overflow: hidden; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
            .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
            .info-label { font-size: 0.85rem; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 5px; }
            .info-value { background: #f8f9fa; padding: 12px 20px; border-radius: 15px; font-weight: 700; color: #333; margin-bottom: 20px; }
        </style>
    </th:block>
</head>
<body>
<section class="py-5">
    <div class="container">
        <div class="profile-card mx-auto" style="max-width: 800px;">
            <div class="profile-header">
                <div class="avatar-box shadow">
                    <img th:if="${user.avatarUrl}" th:src="${user.avatarUrl}" alt="Avatar">
                    <span th:unless="${user.avatarUrl}" th:text="${#strings.substring(user.fullName,0,1)}">H</span>
                </div>
                <h2 class="fw-900 mb-0" th:text="${user.fullName}">Tên Người Dùng</h2>
                <p class="opacity-75" th:text="${user.email}">email@example.com</p>

                <div class="mt-2">
                    <span class="badge rounded-pill bg-white text-primary px-3 py-2">
                        <i class="fas fa-shopping-cart me-1"></i> Giỏ hàng: <span th:text="${cartCount}">0</span>
                    </span>
                </div>
            </div>

            <div class="p-4 p-md-5">
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-label">Số điện thoại</div>
                        <div class="info-value" th:text="${user.phone ?: 'Chưa cập nhật'}">090...</div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-label">Tên đăng nhập</div>
                        <div class="info-value" th:text="${user.username}">user123</div>
                    </div>
                    <div class="col-md-12">
                        <div class="info-label">Địa chỉ nhận hàng</div>
                        <div class="info-value" th:text="${user.address ?: 'Chưa cập nhật'}">Địa chỉ cụ thể...</div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a th:href="@{/user/profile/edit}" class="btn btn-primary">
                        <i class="fas fa-edit me-2"></i>Chỉnh sửa hồ sơ
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
