<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đơn Hàng Của Tôi - KidsFashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root { --primary:#ff6b9d; }
        body { font-family:'Nunito',sans-serif; background:#fff8fb; }
        .navbar-brand { font-family:'Pacifico',cursive; color:var(--primary)!important; font-size:1.8rem; }
        .navbar { background:#fff!important; box-shadow:0 2px 15px rgba(255,107,157,.15); }
        .card { border:none; border-radius:16px; box-shadow:0 2px 15px rgba(0,0,0,.06); }
        .btn-primary { background:var(--primary); border-color:var(--primary); border-radius:50px; font-weight:700; }
        .price-tag { color:var(--primary); font-weight:800; }
        .status-pending { background:#fff3cd; color:#856404; border-radius:10px; padding:4px 12px; font-weight:700; }
        .status-confirmed { background:#cfe2ff; color:#084298; border-radius:10px; padding:4px 12px; font-weight:700; }
        .status-shipping { background:#d4f4ea; color:#0a6640; border-radius:10px; padding:4px 12px; font-weight:700; }
        .status-delivered { background:#d4f4ea; color:#047857; border-radius:10px; padding:4px 12px; font-weight:700; }
        .status-cancelled { background:#ffe0e8; color:#c2185b; border-radius:10px; padding:4px 12px; font-weight:700; }
        .order-card { transition:.2s; }
        .order-card:hover { transform:translateY(-2px); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">🧸 KidsFashion</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/shop" class="btn btn-primary rounded-pill"><i class="fas fa-store me-1"></i>Mua tiếp</a>
            <a href="/logout" class="btn btn-outline-secondary rounded-pill">Đăng xuất</a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h3 class="fw-800 mb-4">📦 Đơn Hàng Của Tôi</h3>

    <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
        <div style="font-size:5rem;">📭</div>
        <h4 class="mt-3 fw-700 text-muted">Chưa có đơn hàng nào</h4>
        <a href="/shop" class="btn btn-primary mt-3"><i class="fas fa-store me-2"></i>Bắt Đầu Mua Sắm</a>
    </div>

    <div class="row g-3">
        <div class="col-12 order-card" th:each="order : ${orders}">
            <div class="card">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-3">
                            <div class="small text-muted">Mã đơn hàng</div>
                            <div class="fw-800" style="color:var(--primary);" th:text="${order.orderCode}">KF123</div>
                            <div class="small text-muted" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày đặt</div>
                        </div>
                        <div class="col-md-3">
                            <div class="small text-muted">Số sản phẩm</div>
                            <div class="fw-700" th:text="${#lists.size(order.orderItems)} + ' sản phẩm'">1 sản phẩm</div>
                        </div>
                        <div class="col-md-2">
                            <div class="small text-muted">Tổng tiền</div>
                            <div class="price-tag" th:text="${#numbers.formatDecimal(order.finalAmount,0,'COMMA',0,'POINT')} + 'đ'">0đ</div>
                        </div>
                        <div class="col-md-3">
                            <span th:class="${order.status.name() == 'PENDING' ? 'status-pending' :
                                             order.status.name() == 'CONFIRMED' ? 'status-confirmed' :
                                             order.status.name() == 'SHIPPING' ? 'status-shipping' :
                                             order.status.name() == 'DELIVERED' ? 'status-delivered' : 'status-cancelled'}"
                                  th:text="${order.statusLabel}">Trạng thái</span>
                        </div>
                        <div class="col-md-1 text-end">
                            <a th:href="@{/orders/{code}(code=${order.orderCode})}" class="btn btn-sm btn-outline-primary rounded-pill">
                                Chi tiết
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
